<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <div class="display">
            <p>0</p>
            <p>0</p>
        </div>
        <div class="btn">
            <table>
                <tr>
                    <td><button id="clear">C</button></td>
                    <td><button id="multiply">*</button></td>
                    <td> <button id="divide">/</button></td>
                    <td><button id="backspace">&#9003;</button></td>
                </tr>
                <tr>
                    <td><button class="num">7</button></td>
                    <td><button class="num">8</button></td>
                    <td><button class="num">9</button></td>
                    <td><button class="add">+</button></td>
                </tr>
                <tr>
                    <td><button class="num">4</button></td>
                    <td><button class="num">5</button></td>
                    <td><button class="num">6</button></td>
                    <td><button class="subtract">-</button></td>
                </tr>
                <tr>
                    <td><button class="num">1</button></td>
                    <td><button class="num">2</button></td>
                    <td><button class="num">3</button></td>
                    <td rowspan="2"><button id="equals">=</button></td>
                </tr>
                <tr>
                    <td colspan="2"><button class="num" id="zero">0</button></td>
                    <td><button id="dot">.</button></td>
                </tr>
            </table>
        </div>
    </div>

    <script src="./main.js"></script>
</body>

</html>
